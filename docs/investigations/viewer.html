<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigation Viewer — FAB Portal</title>
<link rel="stylesheet" href="../assets/style.css">
<script src="../assets/manifest.js"></script>
<!-- marked.js for GFM markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  .viewer-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 48px;
    margin-top: 24px;
  }

  /* Investigation header card */
  .inv-header {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .inv-header .accent-top { position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .inv-header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 8px; }
  .inv-header .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .inv-header .summary-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
  .inv-header .stats-mini {
    display: flex; gap: 24px; flex-wrap: wrap;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .stats-mini-item { }
  .stats-mini-value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .stats-mini-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

  /* TOC */
  .toc-sidebar {
    position: sticky;
    top: 72px;
    max-height: calc(100vh - 90px);
    overflow-y: auto;
    padding-right: 12px;
  }
  .toc-sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 12px; font-weight: 600; }
  .toc-sidebar a {
    display: block; font-size: 12px; color: var(--text-muted); padding: 4px 0 4px 12px;
    border-left: 2px solid transparent; transition: all 0.15s; line-height: 1.4; text-decoration: none;
  }
  .toc-sidebar a:hover { color: var(--text); border-left-color: var(--border-hover); }
  .toc-sidebar a.active { color: var(--accent-text); border-left-color: var(--accent); }
  .toc-sidebar a.toc-h3 { padding-left: 24px; font-size: 11px; }

  /* Back link */
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-muted); margin-bottom: 16px;
  }
  .back-link:hover { color: var(--accent-text); }

  /* Reading progress */
  .progress-bar {
    position: fixed; top: 56px; left: 0; right: 0; height: 3px; z-index: 99;
    background: rgba(255,255,255,0.03);
  }
  .progress-fill { height: 100%; background: var(--accent); width: 0; transition: width 0.1s; }

  /* Loading state */
  .loading { text-align: center; padding: 80px; color: var(--text-muted); }
  .loading .spinner {
    display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center; padding: 80px 32px; color: var(--text-muted);
  }
  .error-msg h2 { color: var(--red); margin-bottom: 8px; }

  /* Code blocks inside md */
  .md-content pre { position: relative; }
  .md-content pre .copy-btn {
    position: absolute; top: 8px; right: 8px;
    background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: var(--text-muted);
    padding: 4px 10px; border-radius: var(--radius-xs); font-size: 11px; cursor: pointer;
    font-family: var(--font); transition: all var(--transition); opacity: 0;
  }
  .md-content pre:hover .copy-btn { opacity: 1; }
  .md-content pre .copy-btn:hover { background: rgba(255,255,255,0.15); color: var(--text); }

  @media (max-width: 900px) {
    .viewer-layout { grid-template-columns: 1fr; }
    .toc-sidebar { display: none; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-brand"><div class="logo">F</div>FAB Portal</div>
  <div class="topnav-links">
    <a href="../portal.html">Home</a>
    <a href="index.html" class="active">Investigations</a>
    <a href="../data-explorer/index.html">Data Explorer</a>
    <a href="../queries/index.html">Query Library</a>
    <a href="https://varunvaithy.github.io/fab-biweekly-dashboard/" target="_blank">Dashboard</a>
  </div>
</nav>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="container">
  <a href="index.html" class="back-link">← Back to all investigations</a>

  <!-- Header card -->
  <div class="inv-header" id="invHeader" style="display:none;"></div>

  <!-- Loading -->
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <p>Loading investigation...</p>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorState" style="display:none;">
    <h2>Investigation not found</h2>
    <p>The requested investigation could not be loaded.</p>
    <a href="index.html" style="margin-top:12px;display:inline-block;">← Back to all investigations</a>
  </div>

  <!-- Main content -->
  <div class="viewer-layout" id="viewerLayout" style="display:none;">
    <div class="toc-sidebar" id="tocSidebar">
      <h3>On This Page</h3>
      <div id="tocLinks"></div>
    </div>
    <div class="md-content" id="mdContent"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const invId = params.get('id');

  if (!invId) {
    showError();
    return;
  }

  const inv = INVESTIGATIONS.find(i => i.id === invId);
  if (!inv) {
    showError();
    return;
  }

  // Set page title
  document.title = `${inv.title} — FAB Portal`;

  // Render header card
  const cat = CATEGORIES[inv.category] || { label: inv.category, color: '#6366f1', icon: '📋' };
  const sev = SEVERITY_META[inv.severity] || { label: 'Unknown', color: '#64748b', bg: 'rgba(100,116,139,0.1)' };
  const st = STATUS_META[inv.status] || { label: inv.status, color: '#64748b' };

  document.getElementById('invHeader').innerHTML = `
    <div class="accent-top" style="background:linear-gradient(90deg, ${cat.color}, ${sev.color})"></div>
    <h1>${inv.title}</h1>
    <div class="meta-row">
      <span class="badge" style="background:${sev.bg};color:${sev.color}">${sev.label}</span>
      <span class="badge badge-default">${cat.icon} ${cat.label}</span>
      <span class="badge" style="background:rgba(255,255,255,0.04);color:${st.color}">● ${st.label}</span>
      <span class="badge badge-default">${inv.id.toUpperCase()}</span>
      <span style="font-size:12px;color:var(--accent-text);font-weight:600;margin-left:auto;background:var(--accent-glow);padding:4px 12px;border-radius:6px;">📅 ${inv.date}</span>
    </div>
    <div class="summary-text">${inv.summary}</div>
    <div class="stats-mini">
      <div class="stats-mini-item">
        <div class="stats-mini-value">${inv.tenants?.toLocaleString() || '—'}</div>
        <div class="stats-mini-label">Tenants</div>
      </div>
      <div class="stats-mini-item">
        <div class="stats-mini-value">${inv.storage}</div>
        <div class="stats-mini-label">Storage</div>
      </div>
      <div class="stats-mini-item">
        <div class="stats-mini-value">${inv.tags.length}</div>
        <div class="stats-mini-label">Signals</div>
      </div>
    </div>
  `;
  document.getElementById('invHeader').style.display = 'block';

  // Load markdown
  try {
    // Determine the correct file path
    let filePath = inv.file;
    // If file path doesn't start with investigations/ or ../, it's relative to docs/
    if (!filePath.startsWith('investigations/') && !filePath.startsWith('../')) {
      filePath = '../' + filePath.replace('docs/', '');
    }
    // If it starts with investigations/, keep as-is (we're already in investigations/)
    if (filePath.startsWith('investigations/')) {
      filePath = filePath.replace('investigations/', '');
    }

    const response = await fetch(filePath);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const md = await response.text();

    // Configure marked
    marked.setOptions({
      gfm: true,
      breaks: false,
      headerIds: true
    });

    // Render markdown
    const html = marked.parse(md);
    document.getElementById('mdContent').innerHTML = html;

    // Add copy buttons to code blocks
    document.querySelectorAll('.md-content pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.onclick = () => {
        const code = pre.querySelector('code');
        navigator.clipboard.writeText(code ? code.textContent : pre.textContent);
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      };
      pre.appendChild(btn);
    });

    // Generate TOC from headings
    const headings = document.querySelectorAll('.md-content h1, .md-content h2, .md-content h3');
    const tocLinks = document.getElementById('tocLinks');
    headings.forEach((h, i) => {
      const id = 'heading-' + i;
      h.id = id;
      const link = document.createElement('a');
      link.href = '#' + id;
      link.textContent = h.textContent;
      if (h.tagName === 'H3') link.className = 'toc-h3';
      if (h.tagName === 'H1') link.style.fontWeight = '600';
      tocLinks.appendChild(link);
    });

    // TOC active state on scroll
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          tocLinks.querySelectorAll('a').forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === '#' + id);
          });
        }
      });
    }, { rootMargin: '-80px 0px -80% 0px' });

    headings.forEach(h => observer.observe(h));

    // Show content
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('viewerLayout').style.display = 'grid';

    // Reading progress bar
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById('progressFill').style.width = pct + '%';
    });

  } catch (err) {
    console.error('Failed to load markdown:', err);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('invHeader').style.display = 'block';
    document.getElementById('viewerLayout').style.display = 'grid';
    document.getElementById('mdContent').innerHTML = `
      <div style="padding:40px;text-align:center;color:var(--text-muted);">
        <p style="font-size:15px;margin-bottom:8px;">Could not load the markdown file.</p>
        <p style="font-size:13px;">File: <code>${inv.file}</code></p>
        <p style="font-size:12px;margin-top:12px;">If running locally, use a local HTTP server:<br>
        <code style="font-size:12px;">npx serve docs</code> or <code style="font-size:12px;">python -m http.server 8000</code></p>
      </div>
    `;
  }
});

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}
</script>
</body>
</html>
